<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>João Pedro Guedes | Portfólio</title>

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <link rel="icon" type="image/png" href="logojp.png">
</head>

<body>

    <header>

        <div class="logo">JP</div>

        <nav>
            <a href="index.html#sobre">Sobre</a>
            <a href="index.html#skills">Skills</a>
            <a href="projetos.html">Projetos</a>
            <a href="contato.html">Contato</a>
        </nav>

        <div class="controls">

            <button id="lang-btn">EN</button>

            <button id="theme-btn">🌙</button>

        </div>

    </header>

    <section id="contato">

        <h2 id="contact-title">Contato</h2>

        <p id="contact-text">
            Tem alguma oportunidade, projeto ou ideia?
            Envie uma mensagem.
        </p>

        <form
            action="https://formsubmit.co/jpgacl20072@gmail.com"
            method="POST"
            class="contact-form">

            <input
                id="name-input"
                type="text"
                name="nome"
                placeholder="Seu nome"
                required>

            <input
                id="email-input"
                type="email"
                name="email"
                placeholder="Seu e-mail"
                required>

            <textarea
                id="message-input"
                name="mensagem"
                placeholder="Sua mensagem"
                rows="6"
                required></textarea>

            <button
                id="send-btn"
                type="submit"
                class="btn">
                Enviar mensagem
            </button>

        </form>

    </section>

    <footer>

        <div class="footer-social">

            <a href="https://github.com/jpgacl" target="_blank">
                <i class="devicon-github-original"></i>
            </a>

            <a href="https://www.linkedin.com/in/joão-pedro-guedes-alcoforado-c-leão-921a1b3b0/"
               target="_blank">
                <i class="devicon-linkedin-plain"></i>
            </a>

        </div>

        <p id="footer-text">
            © 2026 João Pedro Guedes • Ciência da Computação • CESAR School
        </p>

    </footer>

    <script src="script.js"></script>
